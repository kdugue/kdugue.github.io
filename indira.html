<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Indira</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400"
      rel="stylesheet"
    />
    <style>
      .spinner-wrapper {
        position: relative;
        width: 10rem;
        height: 10rem;
      }
      .spinner-ring {
        position: absolute;
        inset: 0;
        border: 4px solid rgba(68, 114, 168, 0.15);
        border-top-color: #4472a8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .spinner-ring.hidden { opacity: 0; }
      .spinner-center {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        line-height: 1;
        transition: transform 0.3s ease;
      }
      .spinner-center.pop {
        transform: scale(1.25);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body class="home-section-1 indira-page">
    <div class="spinner-wrapper">
      <div class="spinner-ring" id="ring"></div>
      <div class="spinner-center" id="center">🇰🇿</div>
    </div>
    <script>
      (function () {
        var fruits = [
          '🍎','🍊','🍋','🍌','🍉','🍇','🍓','🫐','🍑','🍒',
          '🥝','🍍','🥭','🍐','🥥','🍈','🪴','🌽','🥑','🍅'
        ];
        var ring = document.getElementById('ring');
        var center = document.getElementById('center');

        function showFruit() {
          ring.classList.add('hidden');
          center.textContent = fruits[Math.floor(Math.random() * fruits.length)];
          center.classList.add('pop');

          setTimeout(function () {
            center.classList.remove('pop');
            center.textContent = '🇰🇿';
            ring.classList.remove('hidden');
          }, 2000);
        }

        setInterval(showFruit, 10000);
      })();
    </script>
  </body>
</html>
