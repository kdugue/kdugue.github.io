<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Indira</title>
    <link rel="stylesheet" type="text/css" href="./styles.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400"
      rel="stylesheet"
    />
    <style>
      .spinner-wrapper {
        position: relative;
        width: 10rem;
        height: 10rem;
      }
      .spinner-ring {
        position: absolute;
        inset: 0;
        border: 4px solid rgba(68, 114, 168, 0.15);
        border-top-color: #4472a8;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      .spinner-flag {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 4rem;
        line-height: 1;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body class="home-section-1 indira-page">
    <div class="spinner-wrapper">
      <div class="spinner-ring"></div>
      <div class="spinner-flag">🇰🇿</div>
    </div>
  </body>
</html>
